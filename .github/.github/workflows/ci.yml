name: CI - System Health Monitor

# When does this run?
on:
  push:
    branches: [ main ]        # runs on every push to main
  pull_request:
    branches: [ main ]        # runs on every pull request too

jobs:
  test:
    runs-on: ubuntu-latest    # GitHub gives you a free Linux machine

    steps:
      # Step 1: Download your code onto the GitHub machine
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Install Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Step 3: Install your dependencies
      - name: Install dependencies
        run: pip install psutil pytest

      # Step 4: Run your tests!
      - name: Run tests
        run: pytest tests/ -vs